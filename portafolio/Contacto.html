<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/Contacto.css">
    <script>
        function alerta() {
          alert("Mensaje enviado");
        }
    </script>
</head>
<body>
    <h1 class="TituloContacto">Contacto</h1>
    <div class="container">
        <a href="../index.html">
            <img src="../img/house-solid.svg" alt="" class="IconoHome">
        </a>
        <form action=""></form>
            <div class="nombre-correo">
                <input type="text" name="text" id="text" placeholder="nombre"  pattern="[a-zA-Z]">
                <input type="email" name="email" id="email" placeholder="email"  pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$">
            </div>
            <div class="mensaje">
                <input type="text-area" name="asunto" id="asunto" placeholder="asunto" required>
            </div>
            <div class="cuadro-boton">
                <input type="button" value="Enviar" id="boton" onclick="alerta()">
            </div>  
    </div>
</body>
</html>
